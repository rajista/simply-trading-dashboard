services:
  - type: web
    name: simply-trading
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 8 --timeout 180 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: MARKET_CACHE_TTL_SECONDS
        value: "1200"
